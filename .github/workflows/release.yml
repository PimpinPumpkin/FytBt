name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        # If the secret isn't configured (e.g. a fork), we silently skip and
        # app/build.gradle.kts falls back to the debug keystore.
        env:
          KEYSTORE_B64: ${{ secrets.FYTBT_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/fytbt-release.jks"
            echo "Decoded keystore ($(stat -c%s "$RUNNER_TEMP/fytbt-release.jks") bytes)"
          else
            echo "No FYTBT_KEYSTORE_BASE64 secret set — falling back to debug signing."
          fi

      - name: Build release APK
        # Picked up by signingConfigs.releaseFromEnv in app/build.gradle.kts.
        env:
          FYTBT_KEYSTORE_PATH: ${{ runner.temp }}/fytbt-release.jks
          FYTBT_KEYSTORE_PASSWORD: ${{ secrets.FYTBT_KEYSTORE_PASSWORD }}
          FYTBT_KEY_ALIAS: ${{ secrets.FYTBT_KEY_ALIAS }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage APK with version-tagged name
        run: cp app/build/outputs/apk/release/app-release.apk "FytBt-${{ github.ref_name }}.apk"

      - name: Attach APK to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ASSET="FytBt-${TAG}.apk"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "$ASSET"
          fi
